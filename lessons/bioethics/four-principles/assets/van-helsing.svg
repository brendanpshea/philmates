<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" shape-rendering="crispEdges" role="img" aria-label="Pixel portrait of Doctor Van Helsing, an older bearded physician with round glasses">
  <rect width="64" height="80" fill="#1d2235"/>
  <rect y="62" width="64" height="18" fill="#262c44"/>
  <!-- dark coat -->
  <rect x="14" y="50" width="36" height="26" fill="#243a33"/>
  <rect x="18" y="50" width="28" height="26" fill="#2f4d43"/>
  <!-- white collar -->
  <rect x="26" y="48" width="12" height="8" fill="#f2eedd"/>
  <!-- neck/head -->
  <rect x="28" y="42" width="8" height="8" fill="#e0ac72"/>
  <rect x="22" y="18" width="20" height="26" fill="#ecc18a"/>
  <!-- grey hair -->
  <rect x="20" y="14" width="24" height="8" fill="#cfc9b4"/>
  <rect x="18" y="20" width="5" height="10" fill="#cfc9b4"/>
  <rect x="41" y="20" width="5" height="10" fill="#cfc9b4"/>
  <!-- grey beard -->
  <rect x="22" y="38" width="20" height="8" fill="#d6d0bb"/>
  <rect x="24" y="44" width="16" height="4" fill="#c6c0ab"/>
  <!-- round glasses -->
  <rect x="24" y="28" width="7" height="6" fill="none" stroke="#11131f" stroke-width="2"/>
  <rect x="33" y="28" width="7" height="6" fill="none" stroke="#11131f" stroke-width="2"/>
  <rect x="31" y="30" width="2" height="2" fill="#11131f"/>
  <rect x="26" y="30" width="2" height="2" fill="#11131f"/>
  <rect x="36" y="30" width="2" height="2" fill="#11131f"/>
  <!-- kindly brow -->
  <rect x="24" y="25" width="7" height="2" fill="#b9a06a"/>
  <rect x="33" y="25" width="7" height="2" fill="#b9a06a"/>
</svg>
