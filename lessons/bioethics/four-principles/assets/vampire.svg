<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" shape-rendering="crispEdges" role="img" aria-label="Pixel portrait of a vampire Count with pale skin, widow's peak, and a high-collared cape">
  <rect width="64" height="80" fill="#1d2235"/>
  <rect y="62" width="64" height="18" fill="#262c44"/>
  <!-- cape with crimson lining -->
  <rect x="10" y="50" width="44" height="26" fill="#11131f"/>
  <rect x="14" y="48" width="8" height="22" fill="#7a1020"/>
  <rect x="42" y="48" width="8" height="22" fill="#7a1020"/>
  <!-- high collar -->
  <rect x="20" y="44" width="6" height="10" fill="#11131f"/>
  <rect x="38" y="44" width="6" height="10" fill="#11131f"/>
  <!-- shirt -->
  <rect x="26" y="48" width="12" height="14" fill="#cdd3e8"/>
  <!-- neck/head: pale -->
  <rect x="28" y="42" width="8" height="8" fill="#cdd3e8"/>
  <rect x="22" y="18" width="20" height="26" fill="#dfe4f2"/>
  <!-- slicked black hair + widow's peak -->
  <rect x="20" y="14" width="24" height="8" fill="#11131f"/>
  <rect x="18" y="18" width="5" height="14" fill="#11131f"/>
  <rect x="41" y="18" width="5" height="14" fill="#11131f"/>
  <rect x="30" y="22" width="4" height="4" fill="#11131f"/>
  <!-- red eyes + brow -->
  <rect x="25" y="28" width="6" height="2" fill="#11131f"/>
  <rect x="33" y="28" width="6" height="2" fill="#11131f"/>
  <rect x="26" y="30" width="4" height="4" fill="#ff3b4e"/>
  <rect x="34" y="30" width="4" height="4" fill="#ff3b4e"/>
  <!-- mouth + fangs -->
  <rect x="28" y="39" width="8" height="2" fill="#7a1020"/>
  <rect x="29" y="41" width="2" height="3" fill="#f2eedd"/>
  <rect x="33" y="41" width="2" height="3" fill="#f2eedd"/>
</svg>
