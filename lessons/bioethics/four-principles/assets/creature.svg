<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" shape-rendering="crispEdges" role="img" aria-label="Pixel portrait of Frankenstein's creature with a flat head, neck bolts, and stitches">
  <rect width="64" height="80" fill="#1d2235"/>
  <rect y="62" width="64" height="18" fill="#262c44"/>
  <!-- coat -->
  <rect x="14" y="52" width="36" height="24" fill="#3a2f24"/>
  <rect x="18" y="52" width="28" height="24" fill="#4a3c2d"/>
  <!-- neck -->
  <rect x="27" y="44" width="10" height="8" fill="#7fae6b"/>
  <!-- neck bolts -->
  <rect x="20" y="45" width="6" height="4" fill="#9aa3c7"/>
  <rect x="38" y="45" width="6" height="4" fill="#9aa3c7"/>
  <!-- head: green, flat top -->
  <rect x="20" y="20" width="24" height="26" fill="#8cbd77"/>
  <rect x="20" y="20" width="24" height="4" fill="#7fae6b"/>
  <!-- dark flat hair -->
  <rect x="20" y="14" width="24" height="8" fill="#22301f"/>
  <!-- stitches -->
  <rect x="22" y="26" width="8" height="1" fill="#3f5a33"/>
  <rect x="24" y="24" width="1" height="5" fill="#3f5a33"/>
  <rect x="27" y="24" width="1" height="5" fill="#3f5a33"/>
  <!-- heavy brow + sad eyes -->
  <rect x="24" y="30" width="7" height="2" fill="#3f5a33"/>
  <rect x="33" y="30" width="7" height="2" fill="#3f5a33"/>
  <rect x="26" y="32" width="3" height="3" fill="#11131f"/>
  <rect x="35" y="32" width="3" height="3" fill="#11131f"/>
  <!-- flat mouth -->
  <rect x="27" y="40" width="10" height="2" fill="#4a6b3c"/>
</svg>
