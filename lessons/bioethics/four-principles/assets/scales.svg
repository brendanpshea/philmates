<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" shape-rendering="crispEdges" role="img" aria-label="A balanced medical scale of justice">
  <rect width="80" height="80" fill="#1d2235"/>
  <!-- stand -->
  <rect x="38" y="16" width="4" height="48" fill="#cdd3e8"/>
  <rect x="30" y="64" width="20" height="4" fill="#cdd3e8"/>
  <rect x="26" y="68" width="28" height="4" fill="#9aa3c7"/>
  <!-- beam -->
  <rect x="16" y="18" width="48" height="4" fill="#e6e9f5"/>
  <rect x="38" y="12" width="4" height="6" fill="#4cc2ff"/>
  <!-- left chain + pan -->
  <rect x="18" y="22" width="2" height="12" fill="#9aa3c7"/>
  <rect x="10" y="34" width="18" height="3" fill="#4cc2ff"/>
  <rect x="12" y="37" width="14" height="3" fill="#2f93c9"/>
  <!-- right chain + pan -->
  <rect x="60" y="22" width="2" height="12" fill="#9aa3c7"/>
  <rect x="52" y="34" width="18" height="3" fill="#4cc2ff"/>
  <rect x="54" y="37" width="14" height="3" fill="#2f93c9"/>
</svg>
