<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" shape-rendering="crispEdges" role="img" aria-label="A vial of synthetic blood">
  <rect width="64" height="80" fill="#1d2235"/>
  <!-- stopper -->
  <rect x="26" y="12" width="12" height="6" fill="#9aa3c7"/>
  <rect x="28" y="9" width="8" height="4" fill="#cdd3e8"/>
  <!-- glass tube -->
  <rect x="24" y="18" width="16" height="50" fill="#2b3252"/>
  <rect x="26" y="18" width="12" height="50" fill="#3a4673"/>
  <rect x="24" y="66" width="16" height="4" fill="#2b3252"/>
  <!-- blood fill -->
  <rect x="26" y="36" width="12" height="30" fill="#b51228"/>
  <rect x="26" y="36" width="12" height="3" fill="#e23a50"/>
  <rect x="28" y="40" width="3" height="22" fill="#d42138"/>
  <!-- label -->
  <rect x="22" y="44" width="20" height="12" fill="#f2eedd"/>
  <rect x="25" y="47" width="14" height="2" fill="#b51228"/>
  <rect x="25" y="51" width="10" height="2" fill="#9aa3c7"/>
  <!-- shine + sparkle -->
  <rect x="28" y="20" width="2" height="14" fill="#6f80a6"/>
  <rect x="44" y="22" width="2" height="2" fill="#ffe98a"/>
  <rect x="46" y="26" width="2" height="2" fill="#fff"/>
</svg>
