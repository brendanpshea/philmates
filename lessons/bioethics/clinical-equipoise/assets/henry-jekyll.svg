<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" shape-rendering="crispEdges" role="img" aria-label="A period portrait of Henry Jekyll, in a locket frame">
  <rect width="80" height="80" fill="#1d2235"/>
  <!-- locket ring -->
  <rect x="12" y="10" width="56" height="60" fill="#8a6a3a"/>
  <rect x="16" y="14" width="48" height="52" fill="#2b2018"/>
  <!-- sepia portrait -->
  <rect x="28" y="22" width="24" height="18" fill="#c9a06a"/>
  <rect x="26" y="20" width="28" height="7" fill="#3a2a1e"/>
  <rect x="22" y="42" width="36" height="20" fill="#4a3a28"/>
  <rect x="34" y="40" width="12" height="6" fill="#e8ddb8"/>
</svg>
