<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" shape-rendering="crispEdges" role="img" aria-label="A Hyde silhouette looming behind Henry Jekyll's portrait">
  <rect width="80" height="80" fill="#1d2235"/>
  <!-- Henry, faint -->
  <rect x="30" y="16" width="20" height="16" fill="#4a3a28"/>
  <rect x="26" y="34" width="28" height="20" fill="#332a1e"/>
  <!-- Hyde shadow looming behind/above -->
  <rect x="20" y="6" width="40" height="30" fill="#0d0f18"/>
  <rect x="24" y="10" width="32" height="22" fill="#1a0e14"/>
  <rect x="34" y="16" width="4" height="4" fill="#ff5d6c"/>
  <rect x="42" y="16" width="4" height="4" fill="#ff5d6c"/>
</svg>
