<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" shape-rendering="crispEdges" role="img" aria-label="The sly gentleman fox with sandy whiskers">
  <rect width="64" height="80" fill="#1d2235"/>
  <rect y="62" width="64" height="18" fill="#26402c"/>
  <!-- tweed jacket -->
  <rect x="14" y="50" width="36" height="26" fill="#5c5230"/>
  <rect x="18" y="50" width="28" height="26" fill="#73663d"/>
  <rect x="28" y="50" width="8" height="10" fill="#eee9d8"/>
  <!-- ears -->
  <rect x="18" y="12" width="9" height="12" fill="#c2541f"/>
  <rect x="37" y="12" width="9" height="12" fill="#c2541f"/>
  <rect x="20" y="14" width="5" height="7" fill="#2a1a10"/>
  <rect x="39" y="14" width="5" height="7" fill="#2a1a10"/>
  <!-- head -->
  <rect x="18" y="22" width="28" height="20" fill="#d4622a"/>
  <!-- snout -->
  <rect x="26" y="40" width="12" height="10" fill="#e7e2d2"/>
  <rect x="29" y="48" width="6" height="3" fill="#11131f"/>
  <!-- sly narrowed eyes -->
  <rect x="23" y="29" width="7" height="3" fill="#ffd24a"/>
  <rect x="34" y="29" width="7" height="3" fill="#ffd24a"/>
  <rect x="26" y="29" width="2" height="3" fill="#11131f"/>
  <rect x="37" y="29" width="2" height="3" fill="#11131f"/>
  <!-- sandy whiskers -->
  <rect x="12" y="44" width="14" height="1" fill="#eee9d8"/>
  <rect x="38" y="44" width="14" height="1" fill="#eee9d8"/>
  <rect x="12" y="47" width="14" height="1" fill="#cfc9b4"/>
  <rect x="38" y="47" width="14" height="1" fill="#cfc9b4"/>
</svg>
