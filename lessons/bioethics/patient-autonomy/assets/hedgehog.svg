<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" shape-rendering="crispEdges" role="img" aria-label="Mrs Tiggy-Winkle, a sensible hedgehog in a cap and apron">
  <rect width="64" height="80" fill="#1d2235"/>
  <rect y="62" width="64" height="18" fill="#26402c"/>
  <!-- apron/body -->
  <rect x="16" y="50" width="32" height="26" fill="#8a6b4a"/>
  <rect x="22" y="52" width="20" height="24" fill="#eee9d8"/>
  <rect x="22" y="52" width="20" height="3" fill="#d98aa8"/>
  <!-- spiny back/sides -->
  <rect x="12" y="34" width="8" height="22" fill="#6b4f33"/>
  <rect x="44" y="34" width="8" height="22" fill="#6b4f33"/>
  <rect x="14" y="30" width="4" height="6" fill="#5a4128"/>
  <rect x="46" y="30" width="4" height="6" fill="#5a4128"/>
  <!-- spines on top -->
  <rect x="20" y="14" width="24" height="8" fill="#6b4f33"/>
  <rect x="22" y="10" width="3" height="6" fill="#5a4128"/>
  <rect x="30" y="9" width="3" height="7" fill="#5a4128"/>
  <rect x="38" y="10" width="3" height="6" fill="#5a4128"/>
  <!-- mob cap -->
  <rect x="20" y="14" width="24" height="5" fill="#f2eedd"/>
  <rect x="20" y="13" width="24" height="2" fill="#cfc9b4"/>
  <!-- face -->
  <rect x="22" y="22" width="20" height="20" fill="#caa882"/>
  <rect x="26" y="28" width="4" height="4" fill="#11131f"/>
  <rect x="34" y="28" width="4" height="4" fill="#11131f"/>
  <!-- snout -->
  <rect x="30" y="36" width="8" height="4" fill="#a6845e"/>
  <rect x="36" y="37" width="4" height="3" fill="#11131f"/>
</svg>
