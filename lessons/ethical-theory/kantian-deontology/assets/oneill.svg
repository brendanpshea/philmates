<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" shape-rendering="crispEdges" role="img" aria-label="Stylized pixel portrait of an older woman philosopher with short grey hair and glasses">
  <rect width="64" height="80" fill="#1d2235"/>
  <rect y="62" width="64" height="18" fill="#262c44"/>
  <!-- navy top -->
  <rect x="14" y="50" width="36" height="26" fill="#22305a"/>
  <rect x="18" y="50" width="28" height="26" fill="#2e3f72"/>
  <rect x="26" y="48" width="12" height="8" fill="#e0ac72"/>
  <!-- neck/head -->
  <rect x="28" y="42" width="8" height="8" fill="#e0ac72"/>
  <rect x="22" y="18" width="20" height="26" fill="#ecc18a"/>
  <!-- short grey hair -->
  <rect x="20" y="14" width="24" height="8" fill="#cfc9b4"/>
  <rect x="18" y="18" width="5" height="12" fill="#cfc9b4"/>
  <rect x="41" y="18" width="5" height="12" fill="#cfc9b4"/>
  <!-- glasses -->
  <rect x="24" y="28" width="7" height="6" fill="none" stroke="#11131f" stroke-width="2"/>
  <rect x="33" y="28" width="7" height="6" fill="none" stroke="#11131f" stroke-width="2"/>
  <rect x="31" y="30" width="2" height="2" fill="#11131f"/>
  <rect x="26" y="30" width="2" height="2" fill="#11131f"/>
  <rect x="36" y="30" width="2" height="2" fill="#11131f"/>
  <!-- calm, level mouth -->
  <rect x="28" y="39" width="8" height="2" fill="#b8763f"/>
</svg>
