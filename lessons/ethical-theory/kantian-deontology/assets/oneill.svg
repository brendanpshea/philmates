<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 108" shape-rendering="crispEdges" role="img" aria-label="Relic card: a key — O'Neill's test of treating others as ends, asking whether those affected could actually consent (no deception, no coercion)">
  <!-- card frame -->
  <rect width="80" height="108" fill="#050610"/>
  <rect x="2" y="2" width="76" height="104" fill="#46e07a"/>
  <rect x="4" y="4" width="72" height="100" fill="#1d2235"/>
  <!-- title bar + rank gem -->
  <rect x="7" y="7" width="66" height="12" fill="#262c44"/>
  <polygon points="40,8 45,13 40,18 35,13" fill="#46e07a"/>
  <!-- bottom plate + rarity pips -->
  <rect x="7" y="89" width="66" height="12" fill="#262c44"/>
  <rect x="32" y="93" width="4" height="4" fill="#46e07a"/>
  <rect x="38" y="93" width="4" height="4" fill="#46e07a"/>
  <rect x="44" y="93" width="4" height="4" fill="#46e07a"/>
  <!-- key bow (handle) -->
  <rect x="30" y="26" width="20" height="20" fill="#ffcf5a"/>
  <rect x="34" y="30" width="12" height="12" fill="#1d2235"/>
  <rect x="38" y="34" width="4" height="4" fill="#ffcf5a"/>
  <!-- key shaft -->
  <rect x="37" y="46" width="6" height="34" fill="#ffcf5a"/>
  <rect x="38" y="46" width="2" height="34" fill="#ffe9a8"/>
  <!-- key teeth (bit) -->
  <rect x="43" y="62" width="6" height="4" fill="#ffcf5a"/>
  <rect x="43" y="70" width="8" height="4" fill="#ffcf5a"/>
  <rect x="43" y="76" width="5" height="4" fill="#ffcf5a"/>
  <!-- consent gleam -->
  <rect x="33" y="50" width="2" height="2" fill="#46e07a"/>
  <rect x="29" y="58" width="2" height="2" fill="#46e07a"/>
</svg>
