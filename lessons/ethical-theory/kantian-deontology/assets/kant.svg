<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" shape-rendering="crispEdges" role="img" aria-label="Pixel portrait of Immanuel Kant in a powdered wig and grey coat">
  <rect width="64" height="80" fill="#1d2235"/>
  <rect y="62" width="64" height="18" fill="#262c44"/>
  <!-- grey coat -->
  <rect x="14" y="50" width="36" height="26" fill="#3a3f55"/>
  <rect x="18" y="50" width="28" height="26" fill="#4a5170"/>
  <!-- cravat -->
  <rect x="26" y="48" width="12" height="10" fill="#f2eedd"/>
  <!-- neck/head -->
  <rect x="28" y="42" width="8" height="8" fill="#d9a066"/>
  <rect x="22" y="20" width="20" height="24" fill="#e6b87f"/>
  <!-- powdered wig: top + side curls -->
  <rect x="20" y="14" width="24" height="9" fill="#e6e0cf"/>
  <rect x="16" y="22" width="6" height="8" fill="#e6e0cf"/>
  <rect x="42" y="22" width="6" height="8" fill="#e6e0cf"/>
  <rect x="15" y="30" width="6" height="6" fill="#d6d0bb"/>
  <rect x="43" y="30" width="6" height="6" fill="#d6d0bb"/>
  <rect x="16" y="36" width="6" height="6" fill="#e6e0cf"/>
  <rect x="42" y="36" width="6" height="6" fill="#e6e0cf"/>
  <!-- eyes + stern brow -->
  <rect x="25" y="29" width="6" height="2" fill="#9a7b4a"/>
  <rect x="33" y="29" width="6" height="2" fill="#9a7b4a"/>
  <rect x="26" y="31" width="4" height="4" fill="#11131f"/>
  <rect x="34" y="31" width="4" height="4" fill="#11131f"/>
  <!-- firm straight mouth -->
  <rect x="28" y="39" width="8" height="2" fill="#a76b3a"/>
</svg>
