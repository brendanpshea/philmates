<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" shape-rendering="crispEdges" role="img" aria-label="Two interlocking gears representing the universalizability test machine">
  <rect width="80" height="80" fill="#1d2235"/>
  <!-- big gear (green) -->
  <g fill="#46e07a">
    <rect x="22" y="20" width="28" height="28"/>
    <rect x="30" y="14" width="12" height="6"/>
    <rect x="30" y="48" width="12" height="6"/>
    <rect x="16" y="28" width="6" height="12"/>
    <rect x="50" y="28" width="6" height="12"/>
    <rect x="19" y="23" width="6" height="6"/>
    <rect x="47" y="23" width="6" height="6"/>
    <rect x="19" y="39" width="6" height="6"/>
    <rect x="47" y="39" width="6" height="6"/>
  </g>
  <rect x="30" y="28" width="12" height="12" fill="#1d2235"/>
  <!-- small gear (magenta) -->
  <g fill="#ff6ad5">
    <rect x="50" y="46" width="18" height="18"/>
    <rect x="55" y="42" width="8" height="4"/>
    <rect x="55" y="64" width="8" height="4"/>
    <rect x="46" y="51" width="4" height="8"/>
    <rect x="68" y="51" width="4" height="8"/>
  </g>
  <rect x="55" y="51" width="8" height="8" fill="#1d2235"/>
</svg>
