<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" shape-rendering="crispEdges" role="img" aria-label="A sly grinning cat peering through a doorway">
  <rect width="64" height="80" fill="#11131f"/>
  <!-- doorway light -->
  <rect x="8" y="6" width="48" height="68" fill="#262c44"/>
  <rect x="12" y="10" width="40" height="60" fill="#1d2235"/>
  <!-- cat body -->
  <rect x="18" y="52" width="28" height="22" fill="#5b6b8c"/>
  <rect x="22" y="52" width="20" height="22" fill="#6f80a6"/>
  <!-- ears -->
  <rect x="16" y="14" width="10" height="12" fill="#5b6b8c"/>
  <rect x="38" y="14" width="10" height="12" fill="#5b6b8c"/>
  <rect x="19" y="18" width="4" height="6" fill="#e7a9c2"/>
  <rect x="41" y="18" width="4" height="6" fill="#e7a9c2"/>
  <!-- head -->
  <rect x="18" y="24" width="28" height="26" fill="#6f80a6"/>
  <rect x="18" y="24" width="28" height="6" fill="#5b6b8c"/>
  <!-- sly narrowed eyes (green) -->
  <rect x="23" y="33" width="7" height="4" fill="#46e07a"/>
  <rect x="34" y="33" width="7" height="4" fill="#46e07a"/>
  <rect x="26" y="33" width="2" height="4" fill="#11131f"/>
  <rect x="37" y="33" width="2" height="4" fill="#11131f"/>
  <!-- nose + grin -->
  <rect x="30" y="40" width="4" height="3" fill="#e7a9c2"/>
  <rect x="24" y="44" width="16" height="2" fill="#11131f"/>
  <rect x="26" y="46" width="3" height="2" fill="#fff"/>
  <rect x="35" y="46" width="3" height="2" fill="#fff"/>
  <!-- whiskers -->
  <rect x="10" y="41" width="10" height="1" fill="#cdd3e8"/>
  <rect x="44" y="41" width="10" height="1" fill="#cdd3e8"/>
</svg>
