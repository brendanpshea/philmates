<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" shape-rendering="crispEdges" role="img" aria-label="Stylized pixel portrait of a modern woman philosopher with glasses">
  <rect width="64" height="80" fill="#1d2235"/>
  <rect y="62" width="64" height="18" fill="#262c44"/>
  <!-- teal top -->
  <rect x="14" y="50" width="36" height="26" fill="#1f6b63"/>
  <rect x="18" y="50" width="28" height="26" fill="#2a8a80"/>
  <rect x="26" y="48" width="12" height="8" fill="#e0ac72"/>
  <!-- neck/head -->
  <rect x="28" y="42" width="8" height="8" fill="#e0ac72"/>
  <rect x="22" y="18" width="20" height="26" fill="#ecc18a"/>
  <!-- shoulder-length hair framing the face -->
  <rect x="18" y="14" width="28" height="10" fill="#7a5a3a"/>
  <rect x="16" y="20" width="6" height="26" fill="#7a5a3a"/>
  <rect x="42" y="20" width="6" height="26" fill="#7a5a3a"/>
  <!-- glasses -->
  <rect x="24" y="28" width="7" height="6" fill="none" stroke="#11131f" stroke-width="2"/>
  <rect x="33" y="28" width="7" height="6" fill="none" stroke="#11131f" stroke-width="2"/>
  <rect x="31" y="30" width="2" height="2" fill="#11131f"/>
  <rect x="26" y="30" width="2" height="2" fill="#11131f"/>
  <rect x="36" y="30" width="2" height="2" fill="#11131f"/>
  <!-- friendly smile -->
  <rect x="28" y="39" width="8" height="2" fill="#b8763f"/>
  <rect x="27" y="38" width="2" height="2" fill="#b8763f"/>
  <rect x="35" y="38" width="2" height="2" fill="#b8763f"/>
</svg>
