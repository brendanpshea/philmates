<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 108" shape-rendering="crispEdges" role="img" aria-label="Relic card: a paw print inside a badge of standing — Korsgaard's 'fellow creatures,' widening who counts as an end in itself">
  <!-- card frame -->
  <rect width="80" height="108" fill="#050610"/>
  <rect x="2" y="2" width="76" height="104" fill="#ff6ad5"/>
  <rect x="4" y="4" width="72" height="100" fill="#1d2235"/>
  <!-- title bar + rank gem -->
  <rect x="7" y="7" width="66" height="12" fill="#262c44"/>
  <polygon points="40,8 45,13 40,18 35,13" fill="#ff6ad5"/>
  <!-- bottom plate + rarity pips -->
  <rect x="7" y="89" width="66" height="12" fill="#262c44"/>
  <rect x="32" y="93" width="4" height="4" fill="#ff6ad5"/>
  <rect x="38" y="93" width="4" height="4" fill="#ff6ad5"/>
  <rect x="44" y="93" width="4" height="4" fill="#ff6ad5"/>
  <!-- badge / shield of standing -->
  <polygon points="40,24 62,32 62,56 40,82 18,56 18,32" fill="#8d876f"/>
  <polygon points="40,29 57,35 57,54 40,75 23,54 23,35" fill="#262c44"/>
  <!-- paw print: main pad -->
  <rect x="34" y="52" width="12" height="10" fill="#ff6ad5"/>
  <rect x="32" y="55" width="2" height="6" fill="#ff6ad5"/>
  <rect x="46" y="55" width="2" height="6" fill="#ff6ad5"/>
  <!-- toes -->
  <rect x="31" y="44" width="5" height="6" fill="#ff6ad5"/>
  <rect x="37" y="41" width="6" height="6" fill="#ff6ad5"/>
  <rect x="44" y="44" width="5" height="6" fill="#ff6ad5"/>
  <!-- small heart of worth above the paw -->
  <rect x="37" y="33" width="2" height="2" fill="#46e07a"/>
  <rect x="41" y="33" width="2" height="2" fill="#46e07a"/>
  <rect x="38" y="34" width="4" height="2" fill="#46e07a"/>
  <rect x="39" y="36" width="2" height="2" fill="#46e07a"/>
</svg>
