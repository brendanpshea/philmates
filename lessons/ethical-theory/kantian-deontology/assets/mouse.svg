<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" shape-rendering="crispEdges" role="img" aria-label="A small cartoon mouse with big ears, looking nervous">
  <rect width="64" height="80" fill="#1d2235"/>
  <!-- tail -->
  <rect x="46" y="58" width="12" height="3" fill="#d98aa8"/>
  <rect x="54" y="50" width="3" height="10" fill="#d98aa8"/>
  <!-- body -->
  <rect x="18" y="48" width="28" height="22" fill="#b9743f"/>
  <rect x="22" y="48" width="20" height="22" fill="#cf8a52"/>
  <!-- ears -->
  <rect x="14" y="16" width="14" height="14" fill="#b9743f"/>
  <rect x="36" y="16" width="14" height="14" fill="#b9743f"/>
  <rect x="17" y="19" width="8" height="8" fill="#e7a9c2"/>
  <rect x="39" y="19" width="8" height="8" fill="#e7a9c2"/>
  <!-- head -->
  <rect x="20" y="26" width="24" height="24" fill="#cf8a52"/>
  <rect x="20" y="26" width="24" height="6" fill="#b9743f"/>
  <!-- eyes (worried) -->
  <rect x="26" y="34" width="4" height="5" fill="#11131f"/>
  <rect x="34" y="34" width="4" height="5" fill="#11131f"/>
  <rect x="27" y="34" width="1" height="1" fill="#fff"/>
  <rect x="35" y="34" width="1" height="1" fill="#fff"/>
  <!-- nose -->
  <rect x="30" y="42" width="4" height="3" fill="#e7a9c2"/>
  <!-- whiskers -->
  <rect x="14" y="43" width="8" height="1" fill="#9aa3c7"/>
  <rect x="42" y="43" width="8" height="1" fill="#9aa3c7"/>
  <!-- nervous sweat drop -->
  <rect x="44" y="30" width="3" height="5" fill="#4cc2ff"/>
</svg>
