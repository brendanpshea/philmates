<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" shape-rendering="crispEdges" role="img" aria-label="A field of oversized scarlet poppies with a warning sign, a traveler asleep among the stems">
  <rect width="64" height="80" fill="#1d2235"/>
  <!-- sky glow -->
  <rect x="0" y="0" width="64" height="26" fill="#262c44"/>
  <!-- field -->
  <rect x="0" y="26" width="64" height="54" fill="#2c4a2a"/>
  <rect x="0" y="26" width="64" height="3" fill="#3d5a2a"/>
  <!-- drifting fume wisps -->
  <rect x="10" y="20" width="10" height="2" fill="#9aa3c7" opacity="0.5"/>
  <rect x="34" y="16" width="12" height="2" fill="#9aa3c7" opacity="0.5"/>
  <rect x="48" y="22" width="8" height="2" fill="#9aa3c7" opacity="0.5"/>
  <!-- big poppies: stems -->
  <rect x="9" y="40" width="2" height="16" fill="#3d7a34"/>
  <rect x="25" y="34" width="2" height="14" fill="#3d7a34"/>
  <rect x="47" y="38" width="2" height="16" fill="#3d7a34"/>
  <rect x="57" y="46" width="2" height="12" fill="#3d7a34"/>
  <!-- poppy heads -->
  <rect x="5" y="32" width="10" height="8" fill="#d8393f"/>
  <rect x="7" y="30" width="6" height="2" fill="#e85a5f"/>
  <rect x="9" y="35" width="2" height="2" fill="#2a2a3a"/>
  <rect x="21" y="26" width="10" height="8" fill="#d8393f"/>
  <rect x="23" y="24" width="6" height="2" fill="#e85a5f"/>
  <rect x="25" y="29" width="2" height="2" fill="#2a2a3a"/>
  <rect x="43" y="30" width="10" height="8" fill="#d8393f"/>
  <rect x="45" y="28" width="6" height="2" fill="#e85a5f"/>
  <rect x="47" y="33" width="2" height="2" fill="#2a2a3a"/>
  <rect x="54" y="40" width="8" height="6" fill="#d8393f"/>
  <rect x="57" y="42" width="2" height="2" fill="#2a2a3a"/>
  <!-- sleeping traveler -->
  <rect x="28" y="58" width="14" height="5" fill="#3a4673"/>
  <rect x="42" y="57" width="6" height="6" fill="#e8c39a"/>
  <rect x="43" y="55" width="5" height="3" fill="#5c3a2a"/>
  <!-- zzz -->
  <rect x="50" y="50" width="3" height="1" fill="#cdd3e8"/>
  <rect x="52" y="52" width="3" height="1" fill="#cdd3e8"/>
  <rect x="50" y="54" width="3" height="1" fill="#cdd3e8"/>
  <!-- warning sign -->
  <rect x="12" y="58" width="2" height="12" fill="#7a5a3a"/>
  <rect x="6" y="52" width="14" height="8" fill="#e8ddb8"/>
  <rect x="8" y="54" width="10" height="1" fill="#d8393f"/>
  <rect x="8" y="56" width="8" height="1" fill="#5c3a2a"/>
</svg>
