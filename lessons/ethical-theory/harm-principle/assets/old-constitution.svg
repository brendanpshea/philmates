<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" shape-rendering="crispEdges" role="img" aria-label="The Wizard's tattered old constitution: a scroll with clauses crossed out and ink blots">
  <rect width="64" height="80" fill="#1d2235"/>
  <!-- rollers -->
  <rect x="8" y="6" width="48" height="5" fill="#7a5a3a"/>
  <rect x="6" y="5" width="4" height="7" fill="#5c3a2a"/>
  <rect x="54" y="5" width="4" height="7" fill="#5c3a2a"/>
  <!-- parchment, torn bottom edge -->
  <rect x="12" y="11" width="40" height="56" fill="#e8ddb8"/>
  <rect x="12" y="67" width="8" height="4" fill="#e8ddb8"/>
  <rect x="26" y="67" width="10" height="3" fill="#e8ddb8"/>
  <rect x="42" y="67" width="10" height="5" fill="#e8ddb8"/>
  <!-- aged stains -->
  <rect x="40" y="14" width="9" height="7" fill="#d6c8a0"/>
  <rect x="14" y="52" width="8" height="9" fill="#d6c8a0"/>
  <!-- title -->
  <rect x="20" y="15" width="24" height="3" fill="#5c3a2a"/>
  <!-- clause lines -->
  <rect x="16" y="23" width="30" height="2" fill="#8d876f"/>
  <rect x="16" y="28" width="34" height="2" fill="#8d876f"/>
  <rect x="16" y="33" width="26" height="2" fill="#8d876f"/>
  <rect x="16" y="38" width="32" height="2" fill="#8d876f"/>
  <rect x="16" y="43" width="28" height="2" fill="#8d876f"/>
  <rect x="16" y="48" width="33" height="2" fill="#8d876f"/>
  <rect x="16" y="56" width="30" height="2" fill="#8d876f"/>
  <rect x="16" y="61" width="24" height="2" fill="#8d876f"/>
  <!-- angry red cross-outs -->
  <rect x="14" y="23" width="34" height="1" fill="#d8393f"/>
  <rect x="14" y="43" width="32" height="1" fill="#d8393f"/>
  <rect x="14" y="61" width="28" height="1" fill="#d8393f"/>
  <!-- ink blots -->
  <rect x="44" y="32" width="6" height="5" fill="#2a2a3a"/>
  <rect x="46" y="30" width="3" height="3" fill="#2a2a3a"/>
  <rect x="22" y="55" width="4" height="4" fill="#2a2a3a"/>
</svg>
