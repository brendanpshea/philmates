<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" shape-rendering="crispEdges" role="img" aria-label="A rickety rope bridge over a gorge, one plank snapped, a traveler about to step on">
  <rect width="64" height="80" fill="#1d2235"/>
  <!-- gorge walls -->
  <rect x="0" y="30" width="14" height="50" fill="#3a4055"/>
  <rect x="50" y="26" width="14" height="54" fill="#3a4055"/>
  <rect x="0" y="30" width="14" height="3" fill="#4a5270"/>
  <rect x="50" y="26" width="14" height="3" fill="#4a5270"/>
  <!-- river far below -->
  <rect x="14" y="72" width="36" height="8" fill="#2b3252"/>
  <rect x="18" y="74" width="8" height="1" fill="#5a7ab5"/>
  <rect x="32" y="76" width="10" height="1" fill="#5a7ab5"/>
  <!-- rope rails -->
  <rect x="12" y="34" width="40" height="1" fill="#a08a5a"/>
  <rect x="12" y="44" width="40" height="1" fill="#a08a5a"/>
  <!-- posts -->
  <rect x="11" y="32" width="3" height="16" fill="#5c3a2a"/>
  <rect x="50" y="28" width="3" height="16" fill="#5c3a2a"/>
  <!-- planks (one gap, one snapped) -->
  <rect x="16" y="45" width="5" height="3" fill="#7a5a3a"/>
  <rect x="23" y="45" width="5" height="3" fill="#7a5a3a"/>
  <!-- gap at 30 -->
  <rect x="37" y="45" width="5" height="3" fill="#7a5a3a"/>
  <rect x="44" y="44" width="5" height="3" fill="#7a5a3a"/>
  <!-- snapped plank falling -->
  <rect x="31" y="52" width="4" height="2" fill="#7a5a3a"/>
  <rect x="33" y="55" width="3" height="2" fill="#5c3a2a"/>
  <!-- traveler at the edge -->
  <rect x="4" y="20" width="6" height="6" fill="#e8c39a"/>
  <rect x="3" y="18" width="8" height="3" fill="#5c3a2a"/>
  <rect x="3" y="26" width="8" height="8" fill="#3a4673"/>
  <rect x="5" y="34" width="2" height="5" fill="#2a2a3a"/>
  <rect x="8" y="33" width="2" height="5" fill="#2a2a3a"/>
  <!-- walking stick -->
  <rect x="12" y="22" width="1" height="14" fill="#a08a5a"/>
</svg>
