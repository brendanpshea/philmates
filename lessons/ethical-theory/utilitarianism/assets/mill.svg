<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" shape-rendering="crispEdges" role="img" aria-label="Pixel portrait of John Stuart Mill, balding with sideburns in a dark Victorian suit">
  <rect width="64" height="80" fill="#1d2235"/>
  <rect y="62" width="64" height="18" fill="#262c44"/>
  <!-- suit -->
  <rect x="14" y="50" width="36" height="26" fill="#2b2f3f"/>
  <rect x="18" y="50" width="28" height="26" fill="#3a3f55"/>
  <!-- collar + tie -->
  <rect x="24" y="48" width="16" height="6" fill="#f2eedd"/>
  <rect x="30" y="50" width="4" height="14" fill="#4cc2ff"/>
  <!-- neck/head -->
  <rect x="28" y="42" width="8" height="8" fill="#d9a066"/>
  <rect x="22" y="18" width="20" height="26" fill="#e6b87f"/>
  <!-- high balding forehead -->
  <rect x="22" y="18" width="20" height="8" fill="#eec295"/>
  <!-- side hair + big sideburns -->
  <rect x="18" y="24" width="6" height="20" fill="#4b4636"/>
  <rect x="40" y="24" width="6" height="20" fill="#4b4636"/>
  <rect x="20" y="36" width="6" height="10" fill="#4b4636"/>
  <rect x="38" y="36" width="6" height="10" fill="#4b4636"/>
  <!-- eyes -->
  <rect x="26" y="30" width="4" height="4" fill="#11131f"/>
  <rect x="34" y="30" width="4" height="4" fill="#11131f"/>
  <!-- thoughtful mouth -->
  <rect x="29" y="40" width="6" height="2" fill="#a76b3a"/>
</svg>
