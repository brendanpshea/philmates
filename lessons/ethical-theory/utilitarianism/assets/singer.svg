<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" shape-rendering="crispEdges" role="img" aria-label="Pixel portrait of a modern philosopher in glasses and a casual shirt">
  <rect width="64" height="80" fill="#1d2235"/>
  <rect y="62" width="64" height="18" fill="#262c44"/>
  <!-- casual shirt -->
  <rect x="14" y="50" width="36" height="26" fill="#23506b"/>
  <rect x="18" y="50" width="28" height="26" fill="#2c6488"/>
  <rect x="26" y="48" width="12" height="8" fill="#d9a066"/>
  <!-- neck/head -->
  <rect x="28" y="42" width="8" height="8" fill="#d9a066"/>
  <rect x="22" y="18" width="20" height="26" fill="#e6b87f"/>
  <!-- grey hair -->
  <rect x="20" y="14" width="24" height="8" fill="#c9c3ad"/>
  <rect x="18" y="20" width="4" height="12" fill="#c9c3ad"/>
  <rect x="42" y="20" width="4" height="12" fill="#c9c3ad"/>
  <!-- glasses -->
  <rect x="24" y="28" width="6" height="6" fill="none" stroke="#11131f" stroke-width="2"/>
  <rect x="34" y="28" width="6" height="6" fill="none" stroke="#11131f" stroke-width="2"/>
  <rect x="30" y="30" width="4" height="2" fill="#11131f"/>
  <!-- eyes -->
  <rect x="26" y="30" width="2" height="2" fill="#11131f"/>
  <rect x="36" y="30" width="2" height="2" fill="#11131f"/>
  <!-- friendly smile -->
  <rect x="28" y="39" width="8" height="2" fill="#a76b3a"/>
  <rect x="27" y="38" width="2" height="2" fill="#a76b3a"/>
  <rect x="35" y="38" width="2" height="2" fill="#a76b3a"/>
</svg>
