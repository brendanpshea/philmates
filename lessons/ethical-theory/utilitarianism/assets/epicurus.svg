<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" shape-rendering="crispEdges" role="img" aria-label="Pixel portrait of Epicurus, a Greek philosopher in a laurel wreath">
  <rect width="64" height="80" fill="#1d2235"/>
  <!-- garden background -->
  <rect y="60" width="64" height="20" fill="#1a3a24"/>
  <rect x="6" y="50" width="4" height="12" fill="#2e7d46"/>
  <rect x="54" y="50" width="4" height="12" fill="#2e7d46"/>
  <!-- robe -->
  <rect x="16" y="52" width="32" height="24" fill="#e6e0cf"/>
  <rect x="20" y="52" width="24" height="24" fill="#f2eedd"/>
  <rect x="30" y="52" width="4" height="24" fill="#c9c3ad"/>
  <!-- neck/head -->
  <rect x="28" y="44" width="8" height="10" fill="#d9a066"/>
  <rect x="22" y="20" width="20" height="26" fill="#e0ac72"/>
  <rect x="22" y="20" width="20" height="6" fill="#d9a066"/>
  <!-- beard -->
  <rect x="22" y="38" width="20" height="8" fill="#e6e0cf"/>
  <rect x="24" y="44" width="16" height="4" fill="#d8d2bd"/>
  <!-- hair -->
  <rect x="20" y="16" width="24" height="10" fill="#c9c3ad"/>
  <rect x="18" y="22" width="4" height="14" fill="#c9c3ad"/>
  <rect x="42" y="22" width="4" height="14" fill="#c9c3ad"/>
  <!-- laurel wreath -->
  <rect x="18" y="14" width="28" height="4" fill="#46e07a"/>
  <rect x="16" y="18" width="4" height="6" fill="#46e07a"/>
  <rect x="44" y="18" width="4" height="6" fill="#46e07a"/>
  <!-- eyes -->
  <rect x="26" y="30" width="4" height="4" fill="#11131f"/>
  <rect x="34" y="30" width="4" height="4" fill="#11131f"/>
</svg>
