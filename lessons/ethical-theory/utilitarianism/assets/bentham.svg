<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 108" shape-rendering="crispEdges" role="img" aria-label="Relic card: a calculation tablet with a green plus column and a magenta minus column summed to a net total — Bentham's felicific (hedonic) calculus">
  <!-- card frame -->
  <rect width="80" height="108" fill="#050610"/>
  <rect x="2" y="2" width="76" height="104" fill="#4cc2ff"/>
  <rect x="4" y="4" width="72" height="100" fill="#1d2235"/>
  <!-- title bar + rank gem -->
  <rect x="7" y="7" width="66" height="12" fill="#262c44"/>
  <polygon points="40,8 45,13 40,18 35,13" fill="#4cc2ff"/>
  <!-- bottom plate + rarity pips -->
  <rect x="7" y="89" width="66" height="12" fill="#262c44"/>
  <rect x="32" y="93" width="4" height="4" fill="#4cc2ff"/>
  <rect x="38" y="93" width="4" height="4" fill="#4cc2ff"/>
  <rect x="44" y="93" width="4" height="4" fill="#4cc2ff"/>
  <!-- tablet -->
  <rect x="16" y="26" width="48" height="56" fill="#8d876f"/>
  <rect x="19" y="29" width="42" height="50" fill="#11131f"/>
  <!-- column divider -->
  <rect x="39" y="32" width="2" height="32" fill="#3a3f55"/>
  <!-- plus sign (pleasures) -->
  <rect x="28" y="33" width="3" height="9" fill="#46e07a"/>
  <rect x="25" y="36" width="9" height="3" fill="#46e07a"/>
  <!-- minus sign (pains) -->
  <rect x="46" y="36" width="9" height="3" fill="#ff6ad5"/>
  <!-- pleasure units -->
  <rect x="24" y="46" width="5" height="5" fill="#46e07a"/>
  <rect x="31" y="46" width="5" height="5" fill="#46e07a"/>
  <rect x="24" y="53" width="5" height="5" fill="#46e07a"/>
  <rect x="31" y="53" width="5" height="5" fill="#46e07a"/>
  <rect x="24" y="60" width="5" height="5" fill="#46e07a"/>
  <!-- pain units -->
  <rect x="45" y="46" width="5" height="5" fill="#ff6ad5"/>
  <rect x="52" y="46" width="5" height="5" fill="#ff6ad5"/>
  <rect x="45" y="53" width="5" height="5" fill="#ff6ad5"/>
  <!-- sum line + net positive total -->
  <rect x="22" y="68" width="38" height="2" fill="#c9c3ad"/>
  <rect x="37" y="71" width="6" height="6" fill="#46e07a"/>
</svg>
