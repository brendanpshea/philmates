<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" shape-rendering="crispEdges" role="img" aria-label="Pixel portrait of Jeremy Bentham in 18th-century coat and white hair">
  <rect width="64" height="80" fill="#1d2235"/>
  <rect y="62" width="64" height="18" fill="#262c44"/>
  <!-- coat -->
  <rect x="14" y="50" width="36" height="26" fill="#5b4a2e"/>
  <rect x="18" y="50" width="28" height="26" fill="#6e5a38"/>
  <rect x="30" y="50" width="4" height="26" fill="#3f3320"/>
  <!-- cravat -->
  <rect x="26" y="48" width="12" height="10" fill="#f2eedd"/>
  <!-- neck/head -->
  <rect x="28" y="42" width="8" height="8" fill="#d9a066"/>
  <rect x="22" y="20" width="20" height="24" fill="#e6b87f"/>
  <!-- white wavy hair -->
  <rect x="20" y="14" width="24" height="10" fill="#e6e0cf"/>
  <rect x="16" y="22" width="6" height="16" fill="#e6e0cf"/>
  <rect x="42" y="22" width="6" height="16" fill="#e6e0cf"/>
  <rect x="16" y="34" width="4" height="6" fill="#cfc9b4"/>
  <rect x="44" y="34" width="4" height="6" fill="#cfc9b4"/>
  <!-- eyes + brow -->
  <rect x="26" y="28" width="4" height="2" fill="#7a5a30"/>
  <rect x="34" y="28" width="4" height="2" fill="#7a5a30"/>
  <rect x="26" y="31" width="4" height="4" fill="#11131f"/>
  <rect x="34" y="31" width="4" height="4" fill="#11131f"/>
  <!-- slight smile -->
  <rect x="28" y="39" width="8" height="2" fill="#a76b3a"/>
</svg>
